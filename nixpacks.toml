[phases.setup]
nixPkgs = ["nodejs_22", "gcc", "gnumake", "python3"]

[phases.install]
cmds = ["npm install", "npm rebuild better-sqlite3", "cd backend && npm install && npm rebuild better-sqlite3"]

[phases.build]
cmds = ["cd backend && npm run build"]

[phases.start]
cmd = "mkdir -p /tmp/data && cd backend && node dist/server.mjs"
